<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Tracker - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    
    p {
      font-size: 1rem;
      opacity: 0.9;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    button {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .primary {
      background: white;
      color: #2563eb;
      font-weight: 600;
    }
    
    .primary:hover {
      background: #f8fafc;
    }
    
    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }
    
    .online {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    
    .offline {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 1rem;
      }
      
      h1 {
        font-size: 1.25rem;
      }
      
      p {
        font-size: 0.875rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      📱
    </div>
    
    <h1>You're Offline</h1>
    <p>
      Sales Tracker is designed to work offline. You can continue using the app, 
      and your data will sync when you're back online.
    </p>
    
    <div class="actions">
      <button class="primary" onclick="tryReload()">
        Try Again
      </button>
      <button onclick="goToCache()">
        Continue Offline
      </button>
    </div>
    
    <div class="status" id="status">
      <span id="connection-status">Checking connection...</span>
    </div>
  </div>

  <script>
    // Check connection status
    function updateConnectionStatus() {
      const status = document.getElementById('connection-status');
      const statusDiv = document.getElementById('status');
      
      if (navigator.onLine) {
        status.textContent = '✅ Connection restored';
        statusDiv.className = 'status online';
      } else {
        status.textContent = '❌ No internet connection';
        statusDiv.className = 'status offline';
      }
    }
    
    // Try to reload the page
    function tryReload() {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        alert('Still offline. Please check your internet connection.');
      }
    }
    
    // Go to cached version
    function goToCache() {
      // Try to navigate to the main app
      window.location.href = '/';
    }
    
    // Listen for connection changes
    window.addEventListener('online', updateConnectionStatus);
    window.addEventListener('offline', updateConnectionStatus);
    
    // Initial status check
    updateConnectionStatus();
    
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      setTimeout(() => {
        if (navigator.onLine) {
          window.location.reload();
        }
      }, 1000);
    });
  </script>
</body>
</html>
